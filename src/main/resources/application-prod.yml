spring:
  profiles:
    active: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:ai_listing}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:50}
      minimum-idle: ${DB_POOL_MIN:10}
      idle-timeout: 300000
      connection-timeout: 200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-secure-256-bit-key-in-production}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  rate-limit:
    public: ${RATE_LIMIT_PUBLIC:30}
    authenticated: ${RATE_LIMIT_AUTH:60}
    ai-generation: ${RATE_LIMIT_AI:10}
    window-seconds: ${RATE_LIMIT_WINDOW:60}

  ollama:
    base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
    model: ${OLLAMA_MODEL:qwen3.5:0.8b}
    timeout: ${OLLAMA_TIMEOUT:60000}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET:ai-listing-images}

  email:
    from: ${EMAIL_FROM:noreply@ailisting.com}
    frontend-url: ${FRONTEND_URL:https://ailisting.com}

logging:
  level:
    root: INFO
    com.ailisting: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/ai-listing/app.log