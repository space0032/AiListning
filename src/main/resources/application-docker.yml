spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/ai_listing
    username: postgres
    password: postgres

  data:
    redis:
      host: redis
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

app:
  ollama:
    base-url: http://ollama:11434
    model: qwen3.5:0.8b
    timeout: 60000

  minio:
    endpoint: http://minio:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: ai-listing-images

  email:
    from: noreply@ailisting.com
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
