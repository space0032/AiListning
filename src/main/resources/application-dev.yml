spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_listing
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: your-256-bit-secret-key-change-in-production-please-make-it-long-enough
    access-token-expiration: 900000  # 15 minutes
    refresh-token-expiration: 604800000  # 7 days

  rate-limit:
    public: 30
    authenticated: 60
    ai-generation: 10
    window-seconds: 60

  ollama:
    base-url: http://localhost:11434
    model: qwen3.5:0.8b
    timeout: 60000

  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: ai-listing-images

  email:
    from: noreply@ailisting.com
    frontend-url: http://localhost:3000