spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  cache:
    type: simple

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt:
    secret: test-secret-key-for-unit-tests-must-be-at-least-256-bits-long-for-hs256
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

  rate-limit:
    public: 30
    authenticated: 60
    ai-generation: 10
    window-seconds: 60

  ollama:
    base-url: http://localhost:11434
    model: qwen3.5:0.8b
    timeout: 60000

  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: ai-listing-images